<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Estudos - Azul e Verde</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-screen" class="container">
        <h2>Login</h2>
        <form id="login-form">
            <div class="input-group">
                <label>Nome:</label>
                <input type="text" id="login-name" required placeholder="Digite seu nome">
            </div>
            <div class="input-group">
                <label>Usuário:</label>
                <input type="text" id="login-user" required placeholder="Digite seu usuário">
            </div>
            <div class="input-group">
                <label>Senha:</label>
                <input type="password" id="login-password" required placeholder="Digite sua senha">
            </div>
            <button type="submit" class="btn">Acessar Sistema</button>
        </form>
    </div>

    <div id="main-screen" class="container hidden">
        <header>
            <h3>Bem-vindo(a), <span id="user-display"></span>!</h3>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('cronograma')">📅 Cronograma</button>
                <button class="tab-btn" onclick="switchTab('agenda')">📝 Agenda</button>
                <button class="tab-btn" onclick="switchTab('foco')">⏱️ Foco</button>
            </div>
        </header>

        <main>
            <section id="tab-cronograma" class="tab-content">
                <h4>Cronograma Diário</h4>
                <form id="cronograma-form">
                    <input type="text" id="cron-materia" placeholder="Matéria" required>
                    <input type="text" id="cron-assunto" placeholder="Assunto" required>
                    <div class="time-group">
                        <input type="time" id="cron-inicio" required>
                        <span style="color: white;">até</span>
                        <input type="time" id="cron-fim" required>
                    </div>
                    <button type="submit" class="btn-add">Adicionar Matéria</button>
                </form>
                <ul id="lista-cronograma" class="lista"></ul>
            </section>

            <section id="tab-agenda" class="tab-content hidden">
                <h4>Agenda de Provas</h4>
                <form id="prova-form">
                    <input type="text" id="prova-materia" placeholder="Matéria da Prova" required>
                    <input type="date" id="prova-data" required>
                    <button type="submit" class="btn-add">Agendar Prova</button>
                </form>
                <ul id="lista-provas" class="lista"></ul>
            </section>

            <section id="tab-foco" class="tab-content hidden">
                <h4>Técnica Pomodoro</h4>
                <div class="pomodoro-box">
                    <div id="pomodoro-status">Foco Ativo</div>
                    <div id="timer">25:00</div>
                    <div class="timer-controls">
                        <button id="btn-start" onclick="startPomodoro()">Iniciar</button>
                        <button id="btn-pause" class="hidden" onclick="pausePomodoro()">Pausar</button>
                        <button id="btn-reset" onclick="resetPomodoro()">Reiniciar</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
